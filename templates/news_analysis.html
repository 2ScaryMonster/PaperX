{% extends 'base.html' %}
{% block content %}
<div class="card">
  <div class="card-body">
    <h4 class="mb-3">Advanced News Analysis</h4>
    <div class="row g-2 align-items-end">
      <div class="col-lg-4 position-relative">
        <label class="form-label">Symbol</label>
        <input id="na-symbol" class="form-control" placeholder="Type symbol (e.g. TCS.NS)">
        <div id="na-search-results" class="list-group position-absolute w-100 mt-1 shadow-sm" style="z-index:30;"></div>
      </div>
      <div class="col-lg-3">
        <label class="form-label">Source</label>
        <select id="na-source" class="form-select">
          <option value="all">All sources</option>
          <option value="Google News">Google News</option>
          <option value="Economic Times">Economic Times</option>
          <option value="LiveMint">LiveMint</option>
          <option value="Reuters India">Reuters India</option>
          <option value="Moneycontrol">Moneycontrol</option>
          <option value="Yahoo Finance">Yahoo Finance</option>
        </select>
      </div>
      <div class="col-lg-2">
        <label class="form-label">No. of headlines</label>
        <input id="na-count" type="number" min="1" max="20" value="8" class="form-control">
        <div class="small text-muted">Max: 20</div>
      </div>
      <div class="col-lg-3">
        <button id="na-run" class="btn btn-primary w-100">Run Analysis</button>
      </div>
    </div>

    <div id="na-progress-wrap" class="progress mt-3 d-none" role="progressbar" aria-label="News analysis loading">
      <div id="na-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" style="width:0%;"></div>
    </div>

    <div class="mt-3">
      <div id="na-status" class="small text-muted"></div>
      <div id="na-summary" class="fw-semibold"></div>
      <div id="na-model" class="small text-muted mb-2"></div>
      <ul id="na-list" class="mb-0"></ul>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}<script src="/static/js/news_analysis.js?v=20260308b"></script>{% endblock %}
